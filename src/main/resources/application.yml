spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance_db}
    username: ${DB_USERNAME:finance_user}
    password: ${DB_PASSWORD:finance_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  sql:
    init:
      mode: never

  main:
    log-startup-info: true

server:
  port: 8080
  error:
    include-message: always
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}  # 24 hours
  security:
    login:
      max-attempts: 5
      lockout-minutes: 5

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.finance.dashboard: INFO
    AUDIT: INFO
    org.springframework.security: DEBUG
  pattern:
    # Structured pattern — parseable by ELK / CloudWatch / Datadog
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} level=%p logger=%logger{30} thread=%thread - %msg%n"
